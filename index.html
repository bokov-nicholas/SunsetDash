<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sunset Dash</title>
  </head>
  <body>
    <div id="control-bar" style="position: fixed; top: 10px; left: 10px; z-index: 999; background: rgba(0,0,0,0.65); padding: 8px; border-radius: 6px; color: white; font-family: Arial, sans-serif;">
      <label style="display:inline-flex; align-items:center; gap:6px;">
        <input id="gmd-file-input" type="file" accept=".gmd" style="display:inline-block;" />
        <span>Upload .gmd</span>
      </label>
      <button id="convert-to-json" style="margin-left:12px;">Convert &amp; Load</button>
      <button id="download-json" style="margin-left:6px;">Download JSON</button>
      <div id="control-status" style="margin-top:4px; font-size:12px; color:#ddd;">Ready</div>
    </div>
    <div id="game"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
